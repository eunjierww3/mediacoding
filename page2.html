<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담문의</title>
</head>
<body>
    <h1>멀티미디어과 선배에게 문의하기</h1>
    <p>수업, 과제, 진로, 동아리 등 궁금한 내용을 남겨보세요.</p>
    <form action="#" method="get">

        <div>
            <lable for="username">이름</lable>
            <input type="text" placeholder="이름을 입력하세요." name="username" id="username">
        </div>

        <div>
            <lable for="student-id">학번</lable>
            <input type="text" placeholder="예 : 20252513" name="student-id" id="student-id"> 
        </div>
       
        
        <div>
         <lable for="grade">학년</lable>
         <select name="grade">
           <option value="">선택하세요.</option>
           <option value="1">1학년</option>
           <option value="2">2학년</option>
           <option value="3">3학년</option>
           </select>
        </div>

        <div>
            <lable for="email">연락처(이메일)</lable>
            <input type="email" placeholder="예:example@email.com" name="email">
        </div>

        <div>
        <lable for="phone">연락처(전화번호)</lable>
        <input type="tel" placeholder="예:010-0000-0000" name="phone">
        </div>

        <div>
            <lable for="category">문의 분야</lable>
            <select name="category">
                <option value="">선택하세요.</option>
                <option value="class">수업</option>
                <option value="assignment">과제</option>
                <option value="portfolio">포트폴리오</option>
                <option value="career">진로</option>
                <option value="club">동아리 </option>
            </select>


            <div>
                <label>답변 받고 싶은 방법</label>
                <br>
                <lable><input type="radio" name="reply" value="kakao">카카오톡</lable>
                <label><input type="radio" name="reply" value="email">이메일</label>
                <label><input type="radio" name="reply" value="tel">전화</label>
                <lable><input type="radio" name="reply" value="offline">대면</label>
               
            </div>

            <div>
                <label for="title">문의 제목</label>
                <input type="text" name="title" placeholder="예:포트폴리오 작성 방법을 알려주세요.">
            </div>

            <div>
             <lable for="content">문의 내용</lable>
             <textarea name="content" placeholder="궁금한 내용을 자세히 작성하세요." rows="6"></textarea>
            </div>

            <div>
            <lable for="file">첨부 파일</lable>
            <input type="file" name="file">
            </div>

            <div>
              <lable type="checkbox" name="agree">
              개인정보 수집 및 이용에 동의합니다.
              </lable>

              <div>
                <input type="submit" value="문의 보내기">
                 <input type="reset" value="다시 쓰기">
              </div>


        </div>

    </form>

    
</body>
</html>
